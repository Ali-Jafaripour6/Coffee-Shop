<!doctype html>
<html lang="en" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کافی‌شاپ من</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="icon" href="./src/images/fav-icon.png" />
  </head>
  <body class="font-dana bg-gray-100 dark:bg-zinc-800">
    <!-- app icons -->
    <svg class="hidden">
      <symbol
        id="shopping-cart"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
        />
      </symbol>

      <symbol
        id="moon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
        />
      </symbol>

      <symbol
        id="arrow-left"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25"
        />
      </symbol>
    </svg>

    <header
      class="flex right-0 left-0 items-center fixed w-[90%] h-24 px-10 top-9 py-5 rounded-3xl mx-auto backdrop-blur-[6px] bg-black/50"
    >
      <div class="flex justify-between items-center w-full">
        <!-- Logo and Menu -->
        <nav class="flex gap-x-9 h-14">
          <div><img src="./src/images/app-logo.png" alt="Golden Coffee" /></div>

          <ul
            class="flex items-center tracking-tightest gap-x-9 text-xl h-full *:leading-[56px] text-gray-300"
          >
            <li class="font-danaMedium text-orange-200">
              <a href="">صفحه اصلی</a>
            </li>
            <li class="relative group">
              <a class="group-hover:text-orange-300" href="">فروشگاه</a>

              <div
                class="absolute w-52 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all text-base shadow-normal *:transition-colors *:hover:text-orange-300 tracking-normal *:block space-y-4 bg-white p-6 text-zinc-700 dark:text-white dark:bg-zinc-700 rounded-2xl border-t-[3px] border-t-orange-300 top-full"
              >
                <a href="">قهوه تلخ</a>
                <a href="">قهوه شیرین</a>
                <a href="">قهوه آمریکایی</a>
                <a href="">قهوه ترک</a>
                <a href="">قهوه کوبایی</a>
                <a href="">قهوه با شیر</a>
              </div>
            </li>
            <li><a href="">دیکشنری</a></li>
            <li><a href="">بلاگ</a></li>
            <li><a href="">تماس با ما</a></li>
          </ul>
        </nav>
        <!-- Cart & Login Section -->
        <div class="flex text-xl gap-x-10 text-orange-200">
          <!-- logos -->
          <div class="flex items-center gap-x-5">
            <div>
              <svg class="w-8 h-8">
                <use xlink:href="#shopping-cart"></use>
              </svg>
            </div>
            <span>
              <svg class="w-8 h-8">
                <use xlink:href="#moon"></use>
              </svg>
            </span>
          </div>

          <span class="w-px h-14 block bg-white/20"></span>
          <!-- login sec -->
          <a href="" class="flex items-center tracking-tightest gap-x-2.5">
            <svg class="w-8 h-8"><use xlink:href="#arrow-left"></use></svg>
            <span>ورود | ثبت نام</span>
          </a>
        </div>
      </div>
    </header>

    <script src="src/app/app.js"></script>
  </body>
</html>
